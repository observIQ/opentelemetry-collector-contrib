display_name: Windows Event Log Receiver
type: windowseventlog

description: |
  This receiver tails and parses logs from windows event log API using the
  [opentelemetry-log-collection](https://github.com/open-telemetry/opentelemetry-log-collection) library.

status:
  class: receiver
  stability:
    alpha: [logs]
  distributions: [contrib]
  codeowners:
    active: [armstrmi, pjanotti]
  unsupported_platforms: [darwin, linux]

tests:
  config:
    start_at: end
    channel: application

attributes:
  channel:
    description: The name of the Windows Event Log channel.
    type: string

telemetry:
  metrics:
    receiver_windowseventlog_batch_size:
      enabled: true
      description: The number of events fetched from the Windows Event Log API in a single batch read via EvtNext.
      stability: development
      unit: "{events}"
      histogram:
        value_type: int
      attributes: [channel]

    receiver_windowseventlog_channel_size:
      enabled: true
      description: The approximate number of records in the Windows Event Log channel, queried once per poll cycle via EvtGetLogInfo.
      stability: development
      unit: "{events}"
      gauge:
        value_type: int
      attributes: [channel]

    receiver_windowseventlog_event_size:
      enabled: true
      description: The size in bytes of the rendered Windows Event XML per event, measured after decoding from the Windows API buffer.
      stability: development
      unit: By
      histogram:
        value_type: int
      attributes: [channel]

    receiver_windowseventlog_lag:
      enabled: true
      description: The lag between the time a Windows event was originally logged and the time it was received by the collector, computed as the maximum observed lag across all log records in the most recent batch.
      stability: development
      unit: s
      gauge:
        async: true
        value_type: double
      attributes: [channel]

    receiver_windowseventlog_missed_events:
      enabled: true
      description: The estimated number of Windows Event Log records missed due to ring buffer gaps, detected via non-contiguous EventRecordID values. Only observed in channel mode (not query mode).
      stability: development
      unit: "{events}"
      sum:
        value_type: int
        monotonic: true
      attributes: [channel]
